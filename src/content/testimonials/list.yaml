items:
  - person: member-4
    quoteEn: "Placeholder content for testimonials can be easily swapped with real member quotes and feedback once content is ready."
    quoteDe: "Platzhalter-Inhalte fuer Testimonials koennen einfach durch echte Zitate und Rueckmeldungen von Mitgliedern ersetzt werden, sobald die Inhalte bereit sind."
  - person: member-5
    quoteEn: "BEARS gave me the opportunity to work on real aerospace projects while still in university. The hands-on experience was invaluable for my career."
    quoteDe: "BEARS hat mir die Moeglichkeit gegeben, schon waehrend des Studiums an echten Raumfahrtprojekten mitzuarbeiten. Die praktische Erfahrung war unbezahlbar fuer meine Karriere."
  - person: member-6
    quoteEn: "The collaborative environment at BEARS helped me develop both technical skills and leadership abilities. I learned so much from working with passionate teammates."
    quoteDe: "Das kollaborative Umfeld bei BEARS hat mir geholfen, sowohl technische Faehigkeiten als auch Fuehrungskompetenzen zu entwickeln. Ich habe unglaublich viel von der Zusammenarbeit mit leidenschaftlichen Teammitgliedern gelernt."
