name: Compress images

on:
  push:
    branches: [main]
    paths:
      - '**/*.jpg'
      - '**/*.jpeg'
      - '**/*.png'

jobs:
  compress:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci --ignore-scripts

      - name: Find changed images
        id: changed
        run: |
          files=$(git diff --name-only --diff-filter=ACM "${{ github.event.before }}" "${{ github.sha }}" | grep -Ei '\.(jpe?g|png)$' || true)
          {
            echo 'files<<EOF'
            echo "$files"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Compress
        if: steps.changed.outputs.files != ''
        run: echo "${{ steps.changed.outputs.files }}" | xargs -r node scripts/compress-images.mjs

      - name: Commit if changed
        if: steps.changed.outputs.files != ''
        run: |
          if git diff --quiet; then
            echo "No changes after compression"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore(assets): auto-compress oversized images"
          git push
